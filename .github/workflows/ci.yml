name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Bash syntax
        run: bash -n release.sh anytls.sh release.sh scripts/security-scan.sh
      - name: Secret scan
        run: bash scripts/security-scan.sh
